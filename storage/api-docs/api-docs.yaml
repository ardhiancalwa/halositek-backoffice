openapi: 3.0.0
info:
  title: 'HaloSitek Core API'
  description: 'OpenAPI metadata for HaloSitek Backoffice API.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000/api/v1'
    description: 'Local Development Server'
paths:
  /chat/conversations:
    get:
      tags:
        - Chat
      summary: 'List user conversations'
      description: 'Mengambil daftar percakapan milik user yang sedang login.'
      operationId: 3667e86421dee90606c6f3421d249484
      parameters:
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            example: 15
            maximum: 50
            minimum: 1
      responses:
        200:
          description: 'Daftar percakapan berhasil diambil'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Daftar percakapan berhasil diambil.'
                data:
                  -
                    id: 01J2CHATCONVERSATION001
                    name: null
                    is_group: false
                    participant_ids:
                      - 01J2USERA
                      - 01J2USERB
                    last_read_at: '2026-04-19T10:00:00+00:00'
                    unread_count: 2
                    last_message:
                      id: 01J2MESSAGE001
                      conversation_id: 01J2CHATCONVERSATION001
                      user_id: 01J2USERB
                      body: 'Halo, ada update project terbaru.'
                      attachment: null
                      read_at: null
                      is_mine: false
                      created_at: '2026-04-19T09:59:00+00:00'
                      updated_at: '2026-04-19T09:59:00+00:00'
                    updated_at: '2026-04-19T09:59:00+00:00'
                meta:
                  current_page: 1
                  last_page: 1
                  per_page: 15
                  total: 1
                links:
                  first_page_url: 'http://localhost:8000/api/v1/chat/conversations?page=1'
                  last_page_url: 'http://localhost:8000/api/v1/chat/conversations?page=1'
                  next_page_url: null
                  prev_page_url: null
        401:
          $ref: '#/components/responses/UnauthorizedError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
    post:
      tags:
        - Chat
      summary: 'Create conversation'
      description: 'Membuat percakapan baru (default private chat). Jika private chat sudah ada, data existing dapat dikembalikan.'
      operationId: 465fda86773b20ab7a5c811b9218e0ca
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - participant_ids
              properties:
                name:
                  type: string
                  example: null
                  nullable: true
                is_group:
                  type: boolean
                  example: false
                participant_ids:
                  type: array
                  items:
                    type: string
                  example:
                    - 01J2USERB
              type: object
      responses:
        201:
          description: 'Percakapan berhasil dibuat'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 201
                message: 'Percakapan berhasil dibuat.'
                data:
                  id: 01J2CHATCONVERSATION001
                  name: null
                  is_group: false
                  participant_ids:
                    - 01J2USERA
                    - 01J2USERB
                  last_read_at: '2026-04-19T10:00:00+00:00'
                  created_at: '2026-04-19T10:00:00+00:00'
                  updated_at: '2026-04-19T10:00:00+00:00'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        422:
          $ref: '#/components/responses/ValidationError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
  '/chat/conversations/{conversationId}':
    get:
      tags:
        - Chat
      summary: 'Get conversation detail'
      description: 'Mengambil detail percakapan berdasarkan ID conversation.'
      operationId: b7dd22be6c213d44c15ecf7f9e398971
      parameters:
        -
          name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: 'Detail percakapan berhasil diambil'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Detail percakapan berhasil diambil.'
                data:
                  id: 01J2CHATCONVERSATION001
                  name: null
                  is_group: false
                  participant_ids:
                    - 01J2USERA
                    - 01J2USERB
                  last_read_at: '2026-04-19T10:00:00+00:00'
                  created_at: '2026-04-19T10:00:00+00:00'
                  updated_at: '2026-04-19T10:00:00+00:00'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
  '/chat/conversations/{conversationId}/messages':
    get:
      tags:
        - Chat
      summary: 'List messages'
      description: 'Mengambil daftar pesan pada conversation tertentu.'
      operationId: cddfff9ec192fd4a494f54ac875cc7d6
      parameters:
        -
          name: conversationId
          in: path
          required: true
          schema:
            type: string
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            example: 20
            maximum: 100
            minimum: 1
      responses:
        200:
          description: 'Daftar pesan berhasil diambil'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Daftar pesan berhasil diambil.'
                data:
                  -
                    id: 01J2MESSAGE001
                    conversation_id: 01J2CHATCONVERSATION001
                    user_id: 01J2USERA
                    body: Halo!
                    attachment: null
                    read_at: null
                    is_mine: true
                    sender:
                      id: 01J2USERA
                      name: Budi
                      email: budi@example.com
                    created_at: '2026-04-19T10:00:00+00:00'
                    updated_at: '2026-04-19T10:00:00+00:00'
                meta:
                  current_page: 1
                  last_page: 1
                  per_page: 20
                  total: 1
                links:
                  first_page_url: 'http://localhost:8000/api/v1/chat/conversations/01J2CHATCONVERSATION001/messages?page=1'
                  last_page_url: 'http://localhost:8000/api/v1/chat/conversations/01J2CHATCONVERSATION001/messages?page=1'
                  next_page_url: null
                  prev_page_url: null
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
  /chat/messages:
    post:
      tags:
        - Chat
      summary: 'Send message'
      description: 'Mengirim pesan teks ke conversation dan men-trigger broadcast real-time.'
      operationId: 9aa4d4704f6729636d7fc9ae96c20e65
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - conversation_id
                - body
              properties:
                conversation_id:
                  type: string
                  example: 01J2CHATCONVERSATION001
                body:
                  type: string
                  example: 'Halo, kabar kamu gimana?'
                attachment:
                  type: string
                  example: null
                  nullable: true
              type: object
      responses:
        201:
          description: 'Pesan berhasil dikirim'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 201
                message: 'Pesan berhasil dikirim.'
                data:
                  id: 01J2MESSAGE001
                  conversation_id: 01J2CHATCONVERSATION001
                  user_id: 01J2USERA
                  body: 'Halo, kabar kamu gimana?'
                  attachment: null
                  read_at: null
                  is_mine: true
                  sender:
                    id: 01J2USERA
                    name: Budi
                    email: budi@example.com
                  created_at: '2026-04-19T10:00:00+00:00'
                  updated_at: '2026-04-19T10:00:00+00:00'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          $ref: '#/components/responses/NotFoundError'
        422:
          $ref: '#/components/responses/ValidationError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
  '/chat/conversations/{conversationId}/read':
    post:
      tags:
        - Chat
      summary: 'Mark conversation as read'
      description: 'Menandai seluruh pesan lawan bicara pada conversation sebagai sudah dibaca dan update last_read_at user.'
      operationId: 32675d0d310497ea9602a15c503778de
      parameters:
        -
          name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: 'Pesan berhasil ditandai sudah dibaca'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Pesan berhasil ditandai sudah dibaca.'
                data:
                  id: 01J2CHATCONVERSATION001
                  name: null
                  is_group: false
                  participant_ids:
                    - 01J2USERA
                    - 01J2USERB
                  last_read_at: '2026-04-19T10:05:00+00:00'
                  created_at: '2026-04-19T10:00:00+00:00'
                  updated_at: '2026-04-19T10:05:00+00:00'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
  '/chat/conversations/{conversationId}/typing':
    post:
      tags:
        - Chat
      summary: 'Send typing indicator'
      description: 'Mengirim status typing indicator ke private channel conversation.'
      operationId: aa90bc5975ea4902f58cbdc108897e12
      parameters:
        -
          name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              properties:
                is_typing:
                  type: boolean
                  example: true
              type: object
      responses:
        200:
          description: 'Status mengetik berhasil dikirim'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Status mengetik berhasil dikirim.'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
  /architects:
    get:
      tags:
        - Architects
      summary: 'List architects'
      description: 'Returns a list of architects for public browsing.'
      operationId: d4ecab5f93bf0a5d922dd4a0070eba63
      responses:
        200:
          description: 'Architect list retrieved successfully'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Architect list retrieved successfully'
                data:
                  -
                    id: 01HZX9M1F45M2Z6K7T9K7Y8QRA
                    name: 'Architect User'
                    email: architect@halositek.com
                    headline: 'Residential Specialist'
                meta:
                  current_page: 1
                  last_page: 1
                  per_page: 12
                  total: 1
                links:
                  first_page_url: 'http://localhost:8000/api/v1/architects?page=1'
                  last_page_url: 'http://localhost:8000/api/v1/architects?page=1'
                  next_page_url: null
                  prev_page_url: null
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
      security: []
  /architects/wishlist:
    get:
      tags:
        - Architects
      summary: 'List wishlist architects'
      description: "Returns the authenticated user's saved architect wishlist."
      operationId: 5740e73b9215dc96daaa1798730b86fe
      responses:
        200:
          description: 'Wishlist architects retrieved successfully'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Wishlist architects retrieved successfully'
                data:
                  -
                    id: 01HZX9M1F45M2Z6K7T9K7Y8QRA
                    name: 'Architect User'
                    email: architect@halositek.com
                    headline: 'Residential Specialist'
                meta:
                  current_page: 1
                  last_page: 1
                  per_page: 12
                  total: 1
                links:
                  first_page_url: 'http://localhost:8000/api/v1/architects/wishlist?page=1'
                  last_page_url: 'http://localhost:8000/api/v1/architects/wishlist?page=1'
                  next_page_url: null
                  prev_page_url: null
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
  '/architects/{userId}/save':
    post:
      tags:
        - Architects
      summary: 'Save architect to wishlist'
      description: "Saves a specific architect to the authenticated user's wishlist."
      operationId: 40e0529344634b303b282cd24652def4
      parameters:
        -
          name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: 'Architect saved to wishlist successfully'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Architect saved to wishlist successfully'
                data: null
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          $ref: '#/components/responses/NotFoundError'
        409:
          $ref: '#/components/responses/ConflictError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
    delete:
      tags:
        - Architects
      summary: 'Remove architect from wishlist'
      description: "Removes a specific architect from the authenticated user's wishlist."
      operationId: 9c90fdf8eed43272e99f4fa93636f960
      parameters:
        -
          name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: 'Architect removed from wishlist successfully'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Architect removed from wishlist successfully'
                data: null
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
  /auth/register:
    post:
      tags:
        - Auth
      summary: 'Register account'
      description: 'Registers a new user and returns an access token and refresh token.'
      operationId: 8f20688904ee49d0d8739eeb08faf0b1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - name
                - email
                - password
                - password_confirmation
              properties:
                name:
                  type: string
                  example: 'Budi Santoso'
                email:
                  type: string
                  format: email
                  example: budi_santoso@gmail.com
                password:
                  type: string
                  format: password
                  example: password123
                password_confirmation:
                  type: string
                  format: password
                  example: password123
                role:
                  type: string
                  example: user
              type: object
      responses:
        201:
          description: 'Registration successful'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 201
                message: 'Registration successful'
                data:
                  id: 01HZX9M1F45M2Z6K7T9K7Y8QRS
                  name: 'Budi Santoso'
                  email: budi_santoso@gmail.com
                  role: user
                  access_token: 1|plain-access-token
                  refresh_token: 2|plain-refresh-token
                  token_type: Bearer
                  expires_in: 3600
        422:
          $ref: '#/components/responses/ValidationError'
        500:
          $ref: '#/components/responses/ServerError'
  /auth/login:
    post:
      tags:
        - Auth
      summary: 'Login account'
      description: 'Authenticates user credentials and returns a token pair.'
      operationId: 985cd5203e2d0a820e113f2f4fdb2847
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
                - password
                - role
              properties:
                email:
                  type: string
                  format: email
                  example: user@halositek.com
                password:
                  type: string
                  example: securepassword123
                role:
                  type: string
                  example: user
                  enum:
                    - user
                    - architect
                    - admin
              type: object
      responses:
        200:
          description: 'Login successful'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Login successful'
                data:
                  id: 01HZX9M1F45M2Z6K7T9K7Y8QRS
                  name: 'Regular User'
                  email: user@halositek.com
                  role: user
                  access_token: 1|plain-access-token
                  refresh_token: 2|plain-refresh-token
                  token_type: Bearer
                  expires_in: 3600
        401:
          $ref: '#/components/responses/UnauthorizedError'
        422:
          $ref: '#/components/responses/ValidationError'
        500:
          $ref: '#/components/responses/ServerError'
  /auth/refresh-token:
    post:
      tags:
        - Auth
      summary: 'Refresh access token'
      description: 'Exchanges a valid refresh token for a new token pair.'
      operationId: 2fdd67496aeb7fc933c8e1ddb9f7f211
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                refresh_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
              type: object
      responses:
        200:
          description: 'Token refreshed successfully'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Token refreshed successfully'
                data:
                  access_token: 3|plain-access-token
                  refresh_token: 4|plain-refresh-token
                  token_type: Bearer
                  expires_in: 3600
        401:
          $ref: '#/components/responses/UnauthorizedError'
        422:
          $ref: '#/components/responses/ValidationError'
        500:
          $ref: '#/components/responses/ServerError'
  /logout:
    post:
      tags:
        - Auth
      summary: 'Logout current session'
      description: 'Revokes the current access token and optionally the refresh token provided in the request body.'
      operationId: 5660f1ae61b95f0283dfc205d5ffdad5
      requestBody:
        required: false
        content:
          application/json:
            schema:
              properties:
                refresh_token:
                  type: string
              type: object
      responses:
        200:
          description: 'Logout successful'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Logout successful'
                data: null
        401:
          $ref: '#/components/responses/UnauthorizedError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
  /me:
    get:
      tags:
        - Users
      summary: 'Get current user profile'
      description: 'Returns the profile data of the currently authenticated user.'
      operationId: 0fadd24761c66bfa1bfdc46dea94c0dd
      responses:
        200:
          description: 'Profile retrieved successfully'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Profile retrieved successfully'
                data:
                  id: 01HZX9M1F45M2Z6K7T9K7Y8QRS
                  name: 'Regular User'
                  email: user@halositek.com
                  role: user
                  account_status: active
                  created_at: '2026-04-13T10:00:00Z'
                  updated_at: '2026-04-13T10:00:00Z'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
    put:
      tags:
        - Users
      summary: 'Update current profile'
      description: 'Updates the profile of the currently authenticated user.'
      operationId: 5705eaa8e3358048290c90ac2f975ae1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                name:
                  type: string
                  example: 'Budi Santoso'
                email:
                  type: string
                  format: email
                  example: budi@example.com
                password:
                  type: string
                  format: password
                  example: password123
              type: object
      responses:
        200:
          description: 'Profile updated successfully.'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Profile updated successfully.'
                data:
                  user:
                    id: 01HZX9M1F45M2Z6K7T9K7Y8QRT
                    name: 'Updated User Name'
                    email: user@halositek.com
                    role: user
                    account_status: active
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        422:
          $ref: '#/components/responses/ValidationError'
        500:
          $ref: '#/components/responses/ServerError'
      security:
        -
          BearerAuth: []
  /awards:
    get:
      tags:
        - Awards
      summary: 'List awards'
      description: 'Returns a paginated award list with optional status filtering.'
      operationId: ac6ba36ef2b8191a2fe55c943c7d9d4e
      parameters:
        -
          name: status
          in: query
          schema:
            type: string
            enum:
              - pending
              - approved
              - declined
        -
          name: architect_id
          in: query
          schema:
            type: string
        -
          name: search
          in: query
          schema:
            type: string
        -
          name: per_page
          in: query
          schema:
            type: integer
      responses:
        200:
          description: 'Awards retrieved successfully'
          content:
            application/json:
              schema: []
              example:
                success: true
                status_code: 200
                message: 'Awards retrieved successfully'
                data:
                  -
                    id: 01HZX9M1F45M2Z6K7T9K7Y8QAW
                    name: 'Best Residential Design'
                    project_name: 'Modern House'
                    status: approved
                meta:
                  current_page: 1
                  last_page: 1
                  per_page: 12
                  total: 1
                links:
                  first_page_url: 'http://localhost:8000/api/v1/awards?page=1'
                  last_page_url: 'http://localhost:8000/api/v1/awards?page=1'
                  next_page_url: null
                  prev_page_url: null
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/ServerError'
      security: []
    post:
      tags:
        - Awards
      summary: 'Create award'
      description: 'Creates a new award record by an architect, including verification file upload.'
      operationId: b0afa1a40ba8f5a9cb004c157bfdc59d
      requestBody:
        required: true
        content:
          multipart/form-data: []
      responses:
